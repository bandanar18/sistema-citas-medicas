services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medical_system
      POSTGRES_USER: meduser
      POSTGRES_PASSWORD: medpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meduser -d medical_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://meduser:medpass123@db:5432/medical_system
      JWT_SECRET: ${JWT_SECRET:-cambiar-este-secreto-en-produccion}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
